<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Pro</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="container">

  <h2>📊 Dashboard Pro</h2>

  <!-- STATS -->
  <div class="card">
    <p>Income: <span id="income">0</span></p>
    <p>Expense: <span id="expense">0</span></p>
    <p>Profit: <span id="profit">0</span></p>
  </div>

  <!-- ADD TRANSACTION -->
  <div class="card">

    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <input id="amount" placeholder="Amount">

    <button onclick="addTransaction()">Add</button>

  </div>

  <!-- ANALYTICS -->
  <div class="card">
    <h3>📊 Analytics</h3>
    <p>Visual financial insights</p>

    <a href="charts-firebase.html">
      <button>Open Analytics</button>
    </a>
  </div>

  <!-- UPGRADE -->
  <div class="card">
    <a href="pricing.html">
      <button>🚀 Upgrade to Pro</button>
    </a>
  </div>

</div>

<!-- APP LOGIC -->
<script type="module" src="./app.js"></script>

</body>
</html>
