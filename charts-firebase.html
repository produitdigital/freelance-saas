<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firebase Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin:20px 0;
}
</style>

</head>

<body>

<div class="container">

  <h1>📊 Real Firebase Analytics</h1>

  <div class="card">
    <h2>Income vs Expense</h2>
    <canvas id="barChart"></canvas>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyA5lfFr54rr99_ttVPMGXiFUBI5SWgFGVg",
  authDomain: "freelance-saas-576c8.firebaseapp.com",
  projectId: "freelance-saas-576c8",
  storageBucket: "freelance-saas-576c8.firebasestorage.app",
  messagingSenderId: "17320746328",
  appId: "1:17320746328:web:43b94276d4c951d69f592d",
  measurementId: "G-JVB62TKK5C"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 📊 TOTAL VARIABLES */
let incomeTotal = 0;
let expenseTotal = 0;

/* 📊 DRAW CHART */
function drawChart(){

  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: ['Income', 'Expense'],
      datasets: [{
        label: '€',
        data: [incomeTotal, expenseTotal],
        backgroundColor: ['#22c55e', '#ef4444']
      }]
    }
  });

}

/* 🚀 LOAD DATA SAFELY AFTER LOGIN */
onAuthStateChanged(auth, async (user) => {

  if(!user){
    console.log("User not logged in");
    return;
  }

  incomeTotal = 0;
  expenseTotal = 0;

  const snap = await getDocs(collection(db, "users", user.uid, "transactions"));

  snap.forEach(doc => {
    const data = doc.data();

    if(data.type === "income"){
      incomeTotal += data.amount;
    }

    if(data.type === "expense"){
      expenseTotal += data.amount;
    }
  });

  drawChart();

});

</script>

</body>
</html>
